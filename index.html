<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trustpilot Intelligence · IQ Option</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:         #F4F5F7;
  --surface:    #FFFFFF;
  --surface2:   #F0F1F5;
  --surface3:   #E4E6EE;
  --border:     rgba(0,0,0,0.08);
  --border2:    rgba(0,0,0,0.14);
  --text:       #111827;
  --text2:      #374151;
  --text3:      #8B93A7;
  --tp:         #008A5C;
  --tp-dim:     rgba(0,138,92,0.10);
  --tp-glow:    0 0 20px rgba(0,138,92,0.15);
  --red:        #DC2626;
  --red-dim:    rgba(220,38,38,0.09);
  --amber:      #D97706;
  --amber-dim:  rgba(217,119,6,0.10);
  --blue:       #2563EB;
  --blue-dim:   rgba(37,99,235,0.09);
  --shadow:     0 1px 6px rgba(0,0,0,0.08);
  --shadow-lg:  0 8px 32px rgba(0,0,0,0.14);
  --radius:     14px;
  --font:       'Geist', sans-serif;
  --mono:       'Geist Mono', monospace;
  --display:    'Bricolage Grotesque', sans-serif;
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { font-family:var(--font); background:var(--bg); color:var(--text); font-size:13.5px; min-height:100vh; -webkit-font-smoothing:antialiased; }

/* ── LOADER ─────────────────────────────────────────────── */
#loader {
  position:fixed; inset:0; background:var(--bg); z-index:9999;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition:opacity .5s;
}
#loader.hide { opacity:0; pointer-events:none; }
.loader-logo { font-family:var(--display); font-size:11px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:var(--tp); margin-bottom:32px; }
.loader-ring { width:48px; height:48px; border-radius:50%; border:2px solid var(--border2); border-top-color:var(--tp); animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loader-status { margin-top:20px; font-size:11px; color:var(--text3); font-family:var(--mono); }

/* ── TOPBAR ─────────────────────────────────────────────── */
.topbar {
  position:sticky; top:0; z-index:200;
  background:rgba(255,255,255,0.92); backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:0; padding:0 32px; height:60px;
  box-shadow: 0 1px 0 rgba(0,0,0,0.06);
}
.topbar-logo {
  font-family:var(--display); font-size:14px; font-weight:700; letter-spacing:.2px;
  display:flex; align-items:center; gap:10px; margin-right:32px; padding-right:28px;
  border-right:1px solid var(--border);
}
.tp-star-badge {
  width:28px; height:28px; background:var(--tp); border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; color:#fff; font-weight:800;
}
.topbar-right { margin-left:auto; display:flex; align-items:center; gap:10px; }
.month-select-wrap {
  display:flex; align-items:center; gap:8px;
  background:var(--surface2); border:1px solid var(--border2); border-radius:8px; padding:6px 14px;
}
.month-select-wrap select {
  background:none; border:none; color:var(--text); font-size:13px;
  font-family:var(--font); font-weight:600; cursor:pointer; outline:none;
  appearance:none; -webkit-appearance:none; padding-right:16px;
}
.month-select-wrap select option { background:#fff; color:var(--text); }
.refresh-btn {
  background:var(--surface); border:1px solid var(--border2); border-radius:8px;
  padding:7px 14px; color:var(--text2); font-size:11px; font-family:var(--font);
  font-weight:600; cursor:pointer; transition:all .2s; box-shadow:var(--shadow);
}
.refresh-btn:hover { color:var(--tp); border-color:var(--tp); background:var(--tp-dim); }
.data-badge { font-size:10px; color:var(--text3); font-family:var(--mono); }

/* ── LAYOUT ─────────────────────────────────────────────── */
.container { max-width:1360px; margin:0 auto; padding:32px 28px 80px; }
.page-fade { animation: fadeUp .4s ease both; }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }

/* ── SECTION HEADER ─────────────────────────────────────── */
.section-hd {
  display:flex; align-items:center; gap:12px; margin-bottom:16px; margin-top:32px;
}
.section-hd:first-child { margin-top:0; }
.section-label {
  font-family:var(--font); font-size:10px; font-weight:600; letter-spacing:2px;
  text-transform:uppercase; color:var(--text3);
}
.section-hd::after { content:''; flex:1; height:1px; background:var(--border); }

/* ── KPI GRID ────────────────────────────────────────────── */
.kpi-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:12px; margin-bottom:8px; }
.kpi-card {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:20px 18px 16px; position:relative; overflow:hidden;
  transition:border-color .2s, transform .2s, box-shadow .2s;
  box-shadow:var(--shadow);
}
.kpi-card:hover { border-color:var(--border2); transform:translateY(-1px); box-shadow:0 4px 16px rgba(0,0,0,0.10); }
.kpi-card-accent { position:absolute; top:0; left:0; right:0; height:3px; }
.kpi-label { font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text3); margin-bottom:10px; }
.kpi-value { font-family:var(--display); font-size:28px; font-weight:800; line-height:1; margin-bottom:8px; letter-spacing:-1px; }
.kpi-sub { font-size:10px; color:var(--text3); font-family:var(--mono); }
.kpi-delta {
  display:inline-flex; align-items:center; gap:3px;
  font-size:10px; font-weight:700; padding:2px 7px; border-radius:20px;
  font-family:var(--mono); margin-top:4px;
}
.delta-up { background:rgba(0,138,92,.12); color:var(--tp); }
.delta-dn { background:rgba(220,38,38,.10); color:var(--red); }
.delta-nt { background:var(--surface2); color:var(--text3); }

/* TRUST SCORE CARD — special */
.kpi-score {
  grid-column: span 2;
  background:linear-gradient(135deg, #f0faf5 0%, #fafffe 100%);
  border-color:rgba(0,138,92,.2);
}
/* GLOBAL RATING HERO — first card */
.kpi-global {
  grid-column: span 6;
  background: linear-gradient(135deg, #f0faf5 0%, #f5fbff 100%);
  border-color: rgba(0,138,92,.25);
  display: flex; align-items: center; gap: 32px; padding: 22px 28px;
}
.kpi-global-score {
  display: flex; align-items: baseline; gap: 10px; flex-shrink: 0;
}
.kpi-global-num {
  font-family: var(--display); font-size: 52px; font-weight: 800;
  line-height: 1; letter-spacing: -2px; color: var(--tp);
}
.kpi-global-denom {
  font-size: 18px; font-weight: 600; color: var(--text3); font-family: var(--display);
}
.kpi-global-divider {
  width: 1px; height: 56px; background: var(--border2); flex-shrink: 0;
}
.kpi-global-stars {
  display: flex; gap: 6px; font-size: 22px; flex-shrink: 0;
}
.kpi-global-meta { flex: 1; }
.kpi-global-label {
  font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text3); margin-bottom: 4px;
}
.kpi-global-title {
  font-family: var(--display); font-size: 16px; font-weight: 700; color: var(--text);
  margin-bottom: 4px;
}
.kpi-global-sub {
  font-size: 11px; color: var(--text3); font-family: var(--mono);
}
.kpi-global-badge {
  display: inline-flex; align-items: center; gap: 6px; margin-top: 8px;
  background: var(--tp-dim); border: 1px solid rgba(0,138,92,.2);
  border-radius: 20px; padding: 4px 12px;
  font-size: 11px; font-weight: 700; color: var(--tp); font-family: var(--mono);
}
.score-ring-wrap { display:flex; align-items:center; gap:20px; }
.score-ring { position:relative; width:72px; height:72px; flex-shrink:0; }
.score-ring svg { transform:rotate(-90deg); }
.score-ring-label {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:1px;
}
.score-ring-num { font-family:var(--display); font-size:19px; font-weight:800; color:var(--tp); line-height:1; }
.score-ring-sub { font-size:8px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--tp); opacity:.6; }
.star-bars { flex:1; display:flex; flex-direction:column; gap:4px; }
.star-bar-row { display:flex; align-items:center; gap:8px; }
.star-bar-label { font-size:10px; color:var(--text3); font-family:var(--mono); width:12px; text-align:right; flex-shrink:0; }
.star-bar-track { flex:1; background:var(--surface3); border-radius:2px; height:5px; }
.star-bar-fill { height:100%; border-radius:2px; transition:width .6s ease; }
.star-bar-count { font-size:10px; color:var(--text3); font-family:var(--mono); width:18px; text-align:right; flex-shrink:0; }

/* ── CHARTS ROW ──────────────────────────────────────────── */
.chart-card {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:20px 18px; box-shadow:var(--shadow);
}
.chart-card-title { font-size:10px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; color:var(--text3); margin-bottom:16px; }
.chart-wrap { height:200px; position:relative; }

/* ── MATRIX ──────────────────────────────────────────────── */
.matrix-card {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:24px; overflow-x:auto; box-shadow:var(--shadow);
}
.matrix-card-title { font-size:10px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; color:var(--text3); margin-bottom:20px; }
.matrix-table { width:100%; border-collapse:separate; border-spacing:5px; }
.matrix-col-header {
  font-size:10px; font-weight:700; text-align:center; padding:8px 6px;
  color:var(--text3); font-family:var(--mono); letter-spacing:.5px;
}
.matrix-row-label {
  font-size:12px; font-weight:600; text-align:right; padding-right:16px;
  color:var(--text); white-space:nowrap; vertical-align:middle;
}
.matrix-cell {
  border-radius:8px; padding:10px 8px; text-align:center;
  font-family:var(--mono); font-size:13px; font-weight:700;
  cursor:pointer; transition:transform .15s, box-shadow .15s;
  vertical-align:middle; min-width:60px;
}
.matrix-cell:hover { transform:scale(1.1); box-shadow:var(--shadow); z-index:2; position:relative; }
.matrix-cell-zero { background:var(--surface2); color:var(--text3); font-size:11px; cursor:default; }
.matrix-cell-zero:hover { transform:none; box-shadow:none; }

/* ── TOPIC BARS ──────────────────────────────────────────── */
.topic-bars { display:flex; flex-direction:column; gap:8px; }
.topic-bar-row { display:flex; align-items:center; gap:10px; cursor:pointer; padding:6px 8px; border-radius:8px; transition:background .15s; }
.topic-bar-row:hover { background:var(--surface2); }
.topic-bar-name { font-size:12px; font-weight:500; color:var(--text); width:140px; flex-shrink:0; }
.topic-bar-track { flex:1; background:var(--surface3); border-radius:3px; height:8px; overflow:hidden; }
.topic-bar-fill-pos { height:100%; border-radius:3px; background:var(--tp); float:left; }
.topic-bar-fill-neg { height:100%; border-radius:3px; background:var(--red); float:left; }
.topic-bar-fill-mix { height:100%; border-radius:3px; background:var(--amber); float:left; }
.topic-bar-count { font-size:11px; font-weight:700; color:var(--text); font-family:var(--mono); width:26px; text-align:right; }
.topic-bar-pct { font-size:10px; color:var(--text3); font-family:var(--mono); width:34px; text-align:right; }
.topic-bar-arrow { color:var(--text3); }

/* ── SOURCE BREAKDOWN ────────────────────────────────────── */
.source-pills { display:flex; gap:8px; flex-wrap:wrap; }
.source-pill {
  background:var(--surface); border:1px solid var(--border); border-radius:8px;
  padding:10px 16px; display:flex; align-items:center; gap:10px; flex:1; min-width:120px;
  cursor:pointer; transition:all .15s; box-shadow:var(--shadow);
}
.source-pill:hover { border-color:var(--tp); box-shadow:0 2px 12px rgba(0,138,92,0.12); }
.source-pill-name { font-size:11px; font-weight:600; color:var(--text2); }
.source-pill-val { font-family:var(--display); font-size:18px; font-weight:800; color:var(--text); margin-left:auto; }
.source-pill-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

/* ── MODAL ───────────────────────────────────────────────── */
.overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.45); z-index:400;
  align-items:center; justify-content:center; backdrop-filter:blur(8px);
}
.overlay.open { display:flex; }
.modal {
  background:var(--surface); border:1px solid var(--border2); border-radius:20px;
  width:92%; max-width:760px; max-height:88vh;
  display:flex; flex-direction:column; overflow:hidden;
  box-shadow:var(--shadow-lg);
  animation:fadeUp .2s ease;
}
.modal-header {
  flex-shrink:0; padding:20px 24px 18px; border-bottom:1px solid var(--border);
  display:flex; align-items:flex-start; gap:12px;
}
.modal-title { font-family:var(--display); font-size:16px; font-weight:700; color:var(--text); flex:1; }
.modal-subtitle { font-size:11px; color:var(--text3); font-family:var(--mono); margin-top:3px; }
.modal-close {
  flex-shrink:0; width:28px; height:28px; border-radius:8px;
  background:var(--surface2); border:1px solid var(--border2); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; color:var(--text2); transition:all .15s;
}
.modal-close:hover { background:var(--surface3); color:var(--text); }
.modal-body { flex:1; overflow-y:auto; padding:0; }
.modal-content { padding:16px 24px 24px; }

/* Review cards */
.review-card {
  background:var(--surface2); border:1px solid var(--border); border-radius:10px;
  padding:16px; margin-bottom:10px; position:relative;
}
.review-card:last-child { margin-bottom:0; }
.review-card-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; gap:12px; }
.review-stars { display:flex; gap:2px; flex-shrink:0; }
.star-filled { color:var(--tp); font-size:14px; }
.star-empty  { color:var(--surface3); font-size:14px; }
.review-badges { display:flex; gap:6px; flex-wrap:wrap; flex:1; }
.rbadge { font-size:9px; font-weight:700; padding:2px 7px; border-radius:4px; text-transform:uppercase; letter-spacing:.5px; }
.rbadge-score  { background:rgba(0,138,92,.12); color:var(--tp); border:1px solid rgba(0,138,92,.2); }
.rbadge-muted  { background:var(--surface3); color:var(--text3); }
.rbadge-replied{ background:rgba(0,138,92,.12); color:var(--tp); }
.rbadge-pending{ background:rgba(220,38,38,.08); color:var(--red); }
.rbadge-source { background:rgba(37,99,235,.09); color:var(--blue); }
.rbadge-lang   { background:var(--surface3); color:var(--text2); }
.review-text { font-size:12.5px; color:var(--text2); line-height:1.65; font-style:italic; margin-bottom:10px; }
.review-footer { display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap; }
.review-meta { font-size:10px; color:var(--text3); font-family:var(--mono); }
.review-link {
  font-size:10px; font-weight:700; color:var(--tp); text-decoration:none;
  border:1px solid rgba(0,138,92,.25); border-radius:5px; padding:3px 10px;
  transition:all .15s;
}
.review-link:hover { background:var(--tp-dim); }
.review-resp-time { font-size:9px; color:var(--text3); font-family:var(--mono); }

/* Load more */
.load-more-btn {
  display:block; width:100%; padding:12px; margin-top:10px;
  background:var(--surface2); border:1px solid var(--border2); border-radius:8px;
  color:var(--tp); font-size:12px; font-weight:700; font-family:var(--font);
  cursor:pointer; transition:all .15s; text-align:center;
}
.load-more-btn:hover { background:var(--tp-dim); border-color:var(--tp); }

/* Breadcrumb */
.modal-bc { display:flex; align-items:center; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
.bc-item { font-size:10px; color:var(--text3); cursor:pointer; font-family:var(--mono); }
.bc-item:hover { color:var(--tp); }
.bc-item.cur { color:var(--text); font-weight:600; cursor:default; }
.bc-sep { font-size:10px; color:var(--text3); }

/* Count chip */
.count-chip {
  display:inline-flex; align-items:center; gap:6px;
  background:var(--surface2); border:1px solid var(--border2); border-radius:20px;
  padding:4px 12px 4px 8px; margin-bottom:14px;
  font-size:10px; color:var(--text3); font-family:var(--mono);
}
.count-chip-dot { width:6px; height:6px; background:var(--tp); border-radius:50%; }

@media(max-width:900px){
  .kpi-grid { grid-template-columns:1fr 1fr; }
  .kpi-score { grid-column:span 2; }
  .kpi-global { grid-column:span 2; flex-wrap:wrap; gap:16px; }
  .kpi-global-divider { display:none; }
  .container { padding:16px 16px 60px; }
}
</style>
</head>
<body>

<div id="loader">
  <div class="loader-logo">Trustpilot Intel</div>
  <div class="loader-ring"></div>
  <div class="loader-status" id="loader-status">Fetching reviews…</div>
</div>

<nav class="topbar" id="topbar" style="display:none">
  <div class="topbar-logo">
    <div class="tp-star-badge">★</div>
    Trustpilot Intelligence
  </div>
  <div class="topbar-right">
    <div class="data-badge" id="data-badge">—</div>
    <div class="month-select-wrap">
      <select id="month-select" onchange="updateDashboard()"></select>
      <span style="color:var(--text3);font-size:11px;pointer-events:none;margin-left:-12px;">▾</span>
    </div>
    <button class="refresh-btn" onclick="refreshData()">↻ Refresh</button>
  </div>
</nav>

<div class="container page-fade" id="main-container" style="display:none">

  <!-- KPIs -->
  <div class="section-hd" style="margin-top:0;"><div class="section-label">Overview</div></div>
  <div class="kpi-grid" id="kpi-grid"></div>

  <!-- Charts Row -->
  <div class="section-hd"><div class="section-label">Breakdown</div></div>
  <div class="chart-card" style="margin-bottom:12px;">
    <div class="chart-card-title" id="trend-chart-title">Reviews Over Time</div>
    <div class="chart-wrap"><canvas id="chart-trend"></canvas></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
    <div class="chart-card">
      <div class="chart-card-title">Sentiment Split</div>
      <div class="chart-wrap" style="height:200px;"><canvas id="chart-sentiment"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-card-title">Review Source</div>
      <div class="chart-wrap" style="height:200px;"><canvas id="chart-source"></canvas></div>
    </div>
  </div>

  <!-- Topic Analysis -->
  <div class="section-hd"><div class="section-label">Topic Analysis</div></div>
  <div style="display:grid;grid-template-columns:1fr 1.5fr;gap:12px;">
    <div class="chart-card">
      <div class="chart-card-title">Topics by Volume — click to explore</div>
      <div id="topic-bars"></div>
    </div>
    <div class="matrix-card">
      <div class="matrix-card-title">Topic × Language Matrix — colour = dominant sentiment · click any cell</div>
      <table class="matrix-table" id="topic-matrix"></table>
    </div>
  </div>

  <!-- Language Breakdown -->
  <div class="section-hd"><div class="section-label">Language Distribution</div></div>
  <div class="source-pills" id="lang-pills"></div>

</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title">Reviews</div>
        <div class="modal-subtitle" id="modal-subtitle"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const SHEET_ID = '1wLANvdG6ga5xAEoWe7Qd8rWO1snfU-L0fnslMsKIPxw';
const CSV_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const STAR_COLORS = { 1:'#DC2626', 2:'#F97316', 3:'#D97706', 4:'#16A34A', 5:'#008A5C' };
const SENT_COLORS = { Positive:'#008A5C', Negative:'#DC2626', Mixed:'#D97706' };
const SOURCE_COLORS = { Organic:'#2563EB', InvitationLinkApi:'#008A5C', AFSv2:'#D97706' };
const SOURCE_LABELS = { Organic:'Organic', InvitationLinkApi:'Invited', AFSv2:'AFS' };

let ALL_DATA = [];
let CHART_INSTANCES = {};
let currentMonth = '';
let _modalRows = [], _modalPage = 1;
const PAGE_SIZE = 30;

// RFC 4180 CSV Parser
function parseCSV(text){
  const rows=[[]]; let cursor=0,col=0,inQ=false;
  if(text.charCodeAt(0)===0xFEFF) text=text.slice(1);
  while(cursor<text.length){
    const c=text[cursor],n=text[cursor+1];
    if(inQ){
      if(c==='"'&&n==='"'){rows[rows.length-1][col]=(rows[rows.length-1][col]||'')+'"';cursor++;}
      else if(c==='"') inQ=false;
      else rows[rows.length-1][col]=(rows[rows.length-1][col]||'')+c;
    } else {
      if(c==='"') inQ=true;
      else if(c===','){col++;rows[rows.length-1][col]='';}
      else if(c==='\r'&&n==='\n'){rows.push([]);col=0;cursor++;}
      else if(c==='\n'||c==='\r'){rows.push([]);col=0;}
      else{if(rows[rows.length-1][col]===undefined)rows[rows.length-1][col]='';rows[rows.length-1][col]+=c;}
    }
    cursor++;
  }
  const hdrs=rows[0].map(h=>h.trim());
  return rows.slice(1).filter(r=>r.length>2&&r.some(v=>v)).map(row=>{
    const obj={};hdrs.forEach((h,i)=>{obj[h]=(row[i]||'').trim();});return obj;
  });
}

function loaderMsg(t){ document.getElementById('loader-status').textContent=t; }

async function fetchData(){
  loaderMsg('Fetching from Google Sheets…');
  const urls=[CSV_URL,`https://api.allorigins.win/raw?url=${encodeURIComponent(CSV_URL)}`];
  let csv=null;
  for(const u of urls){
    try{const r=await fetch(u,{cache:'no-store'});if(r.ok){csv=await r.text();break;}}catch(e){}
  }
  if(!csv) throw new Error('Could not fetch sheet. Ensure sharing is set to Anyone with the link.');
  loaderMsg('Processing…');
  return processCSV(parseCSV(csv));
}

function processCSV(rows){
  return rows.map(r=>{
    const dateStr=r['Date']||'';
    const d=new Date(dateStr);
    const mKey=!isNaN(d.getTime())?`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`:null;
    const responseStr=r['Response time']||'';
    const rd=new Date(responseStr);
    const respHours=(!isNaN(d.getTime())&&!isNaN(rd.getTime()))?(rd-d)/3600000:null;
    return {
      link:r['Link'], brand:r['Brand']||'IQ Option', type:r['Type']||'Review',
      dateRaw:dateStr, monthKey:mKey, stars:parseInt(r['Updated Rating']||r['Original Rating'])||0,
      content:(r['Updated content']||r['Original content']||'').replace(/\\n/g,' ').trim(),
      topic:r['Topic']||'general', language:(r['Language']||'en').toLowerCase(),
      sentiment:r['Sentiment']||'Neutral', fixed:(r['Fixed']||'').toLowerCase()==='fixed',
      responseTime:respHours, countForScore:(r['Count for score?']||'').toLowerCase()==='true',
      source:r['Source']||'Organic', likes:parseInt(r['Likes'])||0,
      overallRating:parseFloat(r['Overall rating'])||null,
    };
  }).filter(r=>r.monthKey);
}

function getMonthData(data,mk){ return mk==='all'?data:data.filter(r=>r.monthKey===mk); }
function getPrevMonth(mk){
  if(mk==='all') return null;
  const [y,m]=mk.split('-').map(Number);
  const pm=m===1?12:m-1,py=m===1?y-1:y;
  return `${py}-${String(pm).padStart(2,'0')}`;
}
function monthLabel(mk){
  const [y,m]=mk.split('-').map(Number);
  return `${MONTH_NAMES[m-1]} ${y}`;
}
function fmtHours(h){
  if(h===null||isNaN(h)) return '—';
  if(h<1) return `${Math.round(h*60)}m`;
  if(h<24) return `${h.toFixed(1)}h`;
  return `${(h/24).toFixed(1)}d`;
}

function destroyChart(id){ if(CHART_INSTANCES[id]){CHART_INSTANCES[id].destroy();delete CHART_INSTANCES[id];} }

function makeDonut(id, labels, vals, colors){
  destroyChart(id);
  const ctx=document.getElementById(id); if(!ctx) return;
  CHART_INSTANCES[id]=new Chart(ctx,{
    type:'doughnut',
    data:{labels,datasets:[{data:vals,backgroundColor:colors,borderWidth:2,borderColor:'#ffffff',hoverOffset:6}]},
    options:{
      responsive:true,maintainAspectRatio:false,cutout:'68%',
      plugins:{
        legend:{position:'right',labels:{color:'#374151',font:{family:'Geist',size:11},padding:10,boxWidth:10}},
        tooltip:{callbacks:{label:c=>` ${c.label}: ${c.raw} (${((c.raw/vals.reduce((a,b)=>a+b,0))*100).toFixed(1)}%)`}}
      }
    }
  });
}

function makeTrendChart(id, curr, mk){
  destroyChart(id);
  const ctx=document.getElementById(id); if(!ctx) return;
  const days={};
  if(mk==='all'){
    curr.forEach(r=>{ const key=r.monthKey; if(!key) return; days[key]=(days[key]||0)+1; });
  } else {
    const [y,m]=mk.split('-').map(Number);
    const daysInMonth=new Date(y,m,0).getDate();
    for(let d=1;d<=daysInMonth;d++) days[`${mk}-${String(d).padStart(2,'0')}`]=0;
    curr.forEach(r=>{
      const d=new Date(r.dateRaw); if(isNaN(d)) return;
      const key=`${r.monthKey}-${String(d.getDate()).padStart(2,'0')}`;
      if(key in days) days[key]++;
    });
  }
  const labels=Object.keys(days).sort();
  const vals=labels.map(l=>days[l]);
  const tickLabels=mk==='all'
    ? labels.map(l=>{ const [y,mo]=l.split('-').map(Number); return MONTH_NAMES[mo-1].slice(0,3)+' '+String(y).slice(2); })
    : labels.map(l=>parseInt(l.split('-')[2]));
  CHART_INSTANCES[id]=new Chart(ctx,{
    type:'line',
    data:{labels:tickLabels,datasets:[{
      label:'Reviews',data:vals,
      borderColor:'#008A5C',backgroundColor:'rgba(0,138,92,0.08)',
      borderWidth:2,tension:0.35,fill:true,
      pointRadius:vals.map(v=>v>0?4:0),pointHoverRadius:6,
      pointBackgroundColor:'#008A5C',pointBorderColor:'#ffffff',pointBorderWidth:2,
    }]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{
          title:(items)=>{
            const idx=items[0].dataIndex;
            if(mk==='all') return tickLabels[idx];
            const [y,mo]=mk.split('-').map(Number);
            return `${tickLabels[idx]} ${MONTH_NAMES[mo-1]} ${y}`;
          },
          label:(c)=>` ${c.raw} review${c.raw!==1?'s':''}`
        }}
      },
      scales:{
        x:{ticks:{color:'#8B93A7',font:{family:'Geist Mono',size:9},maxTicksLimit:mk==='all'?12:31,maxRotation:0},grid:{display:false}},
        y:{beginAtZero:true,ticks:{color:'#8B93A7',font:{family:'Geist Mono',size:9},precision:0},grid:{color:'rgba(0,0,0,0.05)'}}
      }
    }
  });
}

function renderKPIs(curr, prev, allData, globalRating){
  const scoreR=curr.filter(r=>r.countForScore);
  const avgScore=scoreR.length?(scoreR.reduce((s,r)=>s+r.stars,0)/scoreR.length):0;
  const prevScoreR=prev?prev.filter(r=>r.countForScore):[];
  const prevAvg=prevScoreR.length?(prevScoreR.reduce((s,r)=>s+r.stars,0)/prevScoreR.length):null;
  const total=curr.length, prevTotal=prev?prev.length:null;
  const pos=curr.filter(r=>r.sentiment==='Positive').length;
  const neg=curr.filter(r=>r.sentiment==='Negative').length;
  const mix=curr.filter(r=>r.sentiment==='Mixed').length;
  const replied=curr.filter(r=>r.fixed).length;
  const replyRate=total>0?((replied/total)*100).toFixed(0):0;
  const withResp=curr.filter(r=>r.responseTime!==null&&r.responseTime>=0);
  const withRespCount=withResp.length;
  const avgResp=withRespCount?(withResp.reduce((s,r)=>s+r.responseTime,0)/withRespCount):null;
  const sortedResp=[...withResp.map(r=>r.responseTime)].sort((a,b)=>a-b);
  const medResp=sortedResp.length?sortedResp[Math.floor(sortedResp.length/2)]:null;
  const avgRespStr=fmtHours(avgResp);
  const medRespStr=fmtHours(medResp);
  const avgRespColor=avgResp===null?'var(--text3)':avgResp<24?'var(--tp)':avgResp<72?'var(--amber)':'var(--red)';
  const starCounts=[1,2,3,4,5].map(s=>scoreR.filter(r=>r.stars===s).length);
  const maxStar=Math.max(...starCounts,1);
  const R=30,cx=36,cy=36,circ=2*Math.PI*R;
  const dash=(avgScore/5)*circ;
  const ringColor=avgScore>=4?'#008A5C':avgScore>=3?'#16A34A':avgScore>=2?'#D97706':'#DC2626';

  function delta(curr,prev,good='up'){
    if(prev===null||prev===0) return '';
    const diff=curr-prev,pct=((diff/prev)*100).toFixed(1);
    const isUp=diff>0;const cls=good==='up'?(isUp?'delta-up':'delta-dn'):(isUp?'delta-dn':'delta-up');
    return `<div class="kpi-delta ${cls}">${isUp?'▲':'▼'} ${Math.abs(pct)}%</div>`;
  }

  // Global rating — always from full dataset (platform-wide live number)
  const grVal = globalRating !== null ? globalRating.toFixed(1) : '—';
  const grColor = globalRating===null?'var(--text3)':globalRating>=4?'#008A5C':globalRating>=3?'#16A34A':globalRating>=2?'#D97706':'#DC2626';
  const grStars = globalRating !== null ? Math.round(globalRating) : 0;
  const grStarsHtml = [1,2,3,4,5].map(i=>`<span style="color:${i<=grStars?grColor:'#E4E6EE'}">★</span>`).join('');
  const grLabel = globalRating===null?'No data':globalRating>=4.5?'Excellent':globalRating>=4?'Great':globalRating>=3.5?'Good':globalRating>=3?'Average':'Poor';

  document.getElementById('kpi-grid').innerHTML=`
    <div class="kpi-card kpi-global">
      <div class="kpi-card-accent" style="background:${grColor}"></div>
      <div class="kpi-global-score">
        <span class="kpi-global-num" style="color:${grColor}">${grVal}</span>
        <span class="kpi-global-denom">/ 5</span>
      </div>
      <div class="kpi-global-divider"></div>
      <div class="kpi-global-stars">${grStarsHtml}</div>
      <div class="kpi-global-divider"></div>
      <div class="kpi-global-meta">
        <div class="kpi-global-label">Current Trustpilot Rating</div>
        <div class="kpi-global-title">IQ Option — Live Global Score</div>
        <div class="kpi-global-sub">Reported by Trustpilot across all reviews on the platform</div>
        <div class="kpi-global-badge">● ${grLabel}</div>
      </div>
    </div>
    <div class="kpi-card kpi-score" style="grid-column:span 2;">
      <div class="kpi-label">TrustScore (Verified)</div>
      <div class="score-ring-wrap" style="margin-top:10px;">
        <div class="score-ring">
          <svg width="72" height="72" viewBox="0 0 72 72">
            <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="6"/>
            <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${ringColor}" stroke-width="6"
              stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}" stroke-linecap="round"/>
          </svg>
          <div class="score-ring-label">
            <span class="score-ring-num" style="color:${ringColor}">${avgScore.toFixed(1)}</span>
            <span class="score-ring-sub">/ 5</span>
          </div>
        </div>
        <div class="star-bars">
          ${[5,4,3,2,1].map(s=>`
            <div class="star-bar-row">
              <span class="star-bar-label" style="color:${STAR_COLORS[s]}">${s}</span>
              <div class="star-bar-track"><div class="star-bar-fill" style="width:${(starCounts[s-1]/maxStar*100).toFixed(0)}%;background:${STAR_COLORS[s]}"></div></div>
              <span class="star-bar-count">${starCounts[s-1]}</span>
            </div>`).join('')}
        </div>
      </div>
      ${prevAvg!==null?`<div style="margin-top:10px;">${delta(avgScore,prevAvg,'up')}</div>`:''}
      <div class="kpi-sub" style="margin-top:6px;">Based on ${scoreR.length} verified reviews</div>
    </div>

    <div class="kpi-card">
      <div class="kpi-card-accent" style="background:#008A5C"></div>
      <div class="kpi-label">Total Reviews</div>
      <div class="kpi-value">${total}</div>
      ${delta(total,prevTotal,'up')}
    </div>
    <div class="kpi-card" style="cursor:pointer" onclick="openReviewModal('Positive Reviews',window.curr.filter(r=>r.sentiment==='Positive'))">
      <div class="kpi-card-accent" style="background:#008A5C"></div>
      <div class="kpi-label">Positive</div>
      <div class="kpi-value" style="color:var(--tp)">${pos}</div>
      <div class="kpi-sub">${total>0?((pos/total)*100).toFixed(0):0}% of total</div>
    </div>
    <div class="kpi-card" style="cursor:pointer" onclick="openReviewModal('Negative Reviews',window.curr.filter(r=>r.sentiment==='Negative'))">
      <div class="kpi-card-accent" style="background:var(--red)"></div>
      <div class="kpi-label">Negative</div>
      <div class="kpi-value" style="color:var(--red)">${neg}</div>
      <div class="kpi-sub">${total>0?((neg/total)*100).toFixed(0):0}% of total</div>
    </div>
    <div class="kpi-card" style="cursor:pointer" onclick="openReviewModal('Mixed Reviews',window.curr.filter(r=>r.sentiment==='Mixed'))">
      <div class="kpi-card-accent" style="background:var(--amber)"></div>
      <div class="kpi-label">Mixed</div>
      <div class="kpi-value" style="color:var(--amber)">${mix}</div>
      <div class="kpi-sub">${total>0?((mix/total)*100).toFixed(0):0}% of total</div>
    </div>
    <div class="kpi-card" onclick="openReviewModal('Replied Reviews',window.curr.filter(r=>r.fixed))" style="cursor:pointer;grid-column:span 3;">
      <div class="kpi-card-accent" style="background:var(--blue)"></div>
      <div class="kpi-label">ORM Replied</div>
      <div class="kpi-value" style="color:var(--blue)">${replied}</div>
      <div class="kpi-sub">${replyRate}% reply rate</div>
    </div>
    <div class="kpi-card" style="grid-column:span 3;">
      <div class="kpi-card-accent" style="background:${avgRespColor}"></div>
      <div class="kpi-label">Avg Response Time</div>
      <div class="kpi-value" style="font-size:22px;color:${avgRespColor}">${avgRespStr}</div>
      <div class="kpi-sub">${medRespStr} median · ${withRespCount} reviews</div>
    </div>
  `;
}

function renderCharts(curr, allData, mk){
  const titleEl=document.getElementById('trend-chart-title');
  if(titleEl) titleEl.textContent = mk==='all' ? 'Reviews Over Time — All Time' : `Daily Reviews — ${monthLabel(mk)}`;
  makeTrendChart('chart-trend', curr, mk);
  const pos=curr.filter(r=>r.sentiment==='Positive').length;
  const neg=curr.filter(r=>r.sentiment==='Negative').length;
  const mix=curr.filter(r=>r.sentiment==='Mixed').length;
  makeDonut('chart-sentiment',['Positive','Negative','Mixed'],[pos,neg,mix],['#008A5C','#DC2626','#D97706']);
  const sources={};
  curr.forEach(r=>sources[r.source]=(sources[r.source]||0)+1);
  const sKeys=Object.keys(sources);
  makeDonut('chart-source',sKeys.map(s=>SOURCE_LABELS[s]||s),sKeys.map(s=>sources[s]),sKeys.map(s=>SOURCE_COLORS[s]||'#2563EB'));
}

function renderTopicBars(curr){
  const topics={};
  curr.forEach(r=>{
    if(!topics[r.topic]) topics[r.topic]={pos:0,neg:0,mix:0,total:0};
    topics[r.topic].total++;
    if(r.sentiment==='Positive') topics[r.topic].pos++;
    else if(r.sentiment==='Negative') topics[r.topic].neg++;
    else topics[r.topic].mix++;
  });
  const sorted=Object.entries(topics).sort((a,b)=>b[1].total-a[1].total);
  const maxT=sorted[0]?sorted[0][1].total:1;
  const el=document.getElementById('topic-bars');
  el.innerHTML=`<div class="topic-bars">${sorted.map(([t,v])=>{
    const pw=((v.pos/maxT)*100).toFixed(0);
    const nw=((v.neg/maxT)*100).toFixed(0);
    const mw=((v.mix/maxT)*100).toFixed(0);
    return `<div class="topic-bar-row" onclick="openReviewModal('Topic: ${t}', window.curr.filter(r=>r.topic==='${t}'))">
      <span class="topic-bar-name">${t}</span>
      <div class="topic-bar-track">
        <div class="topic-bar-fill-neg" style="width:${nw}%"></div>
        <div class="topic-bar-fill-mix" style="width:${mw}%"></div>
        <div class="topic-bar-fill-pos" style="width:${pw}%"></div>
      </div>
      <span class="topic-bar-count">${v.total}</span>
      <span class="topic-bar-arrow">›</span>
    </div>`;
  }).join('')}</div>`;
}

function renderMatrix(curr){
  const topics=[...new Set(curr.map(r=>r.topic))].sort();
  const langs=[...new Set(curr.map(r=>r.language))].sort();
  const LANG_NAMES={'en':'EN','es':'ES','pt':'PT','fr':'FR','de':'DE','th':'TH','my':'MY'};
  const table=document.getElementById('topic-matrix');
  let html=`<thead><tr><th></th>`;
  langs.forEach(l=>html+=`<th class="matrix-col-header">${LANG_NAMES[l]||l.toUpperCase()}</th>`);
  html+=`</tr></thead><tbody>`;
  topics.forEach(t=>{
    html+=`<tr><td class="matrix-row-label">${t}</td>`;
    langs.forEach(l=>{
      const matches=curr.filter(r=>r.topic===t&&r.language===l);
      const cnt=matches.length;
      if(cnt===0){
        html+=`<td class="matrix-cell matrix-cell-zero">·</td>`;
      } else {
        const neg=matches.filter(r=>r.sentiment==='Negative').length;
        const pos=matches.filter(r=>r.sentiment==='Positive').length;
        const mix=matches.filter(r=>r.sentiment==='Mixed').length;
        const dom=neg>=pos&&neg>=mix?'neg':pos>=mix?'pos':'mix';
        const col=dom==='neg'?'220,38,38':dom==='pos'?'0,138,92':'217,119,6';
        const opacity=0.10+(cnt/10)*0.50;
        html+=`<td class="matrix-cell" style="background:rgba(${col},${Math.min(opacity,0.75)});color:rgb(${col});"
          onclick="openReviewModal('${t} · ${(LANG_NAMES[l]||l.toUpperCase())}', window.curr.filter(r=>r.topic==='${t}'&&r.language==='${l}'))">${cnt}</td>`;
      }
    });
    html+=`</tr>`;
  });
  table.innerHTML=html+`</tbody>`;
}

function renderLangPills(curr){
  const langs={};
  curr.forEach(r=>langs[r.language]=(langs[r.language]||0)+1);
  const sorted=Object.entries(langs).sort((a,b)=>b[1]-a[1]);
  const langNames={'en':'English','es':'Spanish','pt':'Portuguese','fr':'French','de':'German','th':'Thai','my':'Malay'};
  const langColors=['#008A5C','#2563EB','#D97706','#DC2626','#7C3AED','#16A34A','#DB2777'];
  document.getElementById('lang-pills').innerHTML=sorted.map(([l,cnt],i)=>`
    <div class="source-pill" onclick="openReviewModal('Language: ${langNames[l]||l.toUpperCase()}', window.curr.filter(r=>r.language==='${l}'))">
      <div class="source-pill-dot" style="background:${langColors[i%langColors.length]}"></div>
      <div>
        <div class="source-pill-name">${langNames[l]||l.toUpperCase()}</div>
        <div style="font-size:9px;color:var(--text3);margin-top:2px;">${((cnt/curr.length)*100).toFixed(0)}%</div>
      </div>
      <div class="source-pill-val">${cnt}</div>
    </div>`).join('');
}

function openReviewModal(title, rows){
  _modalRows=[...rows].sort((a,b)=>new Date(b.dateRaw)-new Date(a.dateRaw));
  _modalPage=1;
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-subtitle').textContent=`${rows.length} review${rows.length!==1?'s':''} · most recent first`;
  document.getElementById('modal-body').innerHTML='<div class="modal-content">'+buildReviewPage()+'</div>';
  document.getElementById('overlay').classList.add('open');
}

function buildReviewPage(){
  const showing=Math.min(_modalPage*PAGE_SIZE,_modalRows.length);
  const slice=_modalRows.slice(0,showing);
  let html=`<div class="count-chip"><span class="count-chip-dot"></span>Showing ${showing} of ${_modalRows.length}</div>`;
  html+=slice.map(r=>reviewCardHtml(r)).join('');
  if(showing<_modalRows.length){
    html+=`<button class="load-more-btn" onclick="loadMoreReviews()">Load ${Math.min(PAGE_SIZE,_modalRows.length-showing)} more <span style="opacity:.5;">(${_modalRows.length-showing} remaining)</span></button>`;
  } else if(_modalRows.length>PAGE_SIZE){
    html+=`<div style="text-align:center;padding:12px;font-size:10px;color:var(--text3);font-family:var(--mono);">All ${_modalRows.length} reviews loaded</div>`;
  }
  return html;
}

function loadMoreReviews(){
  _modalPage++;
  const body=document.getElementById('modal-body');
  const scrollTop=body.scrollTop;
  body.innerHTML='<div class="modal-content">'+buildReviewPage()+'</div>';
  body.scrollTop=scrollTop;
}

function reviewCardHtml(r){
  const stars='★'.repeat(r.stars)+'☆'.repeat(5-r.stars);
  const starsHtml=r.stars>0?`<div class="review-stars">${
    Array.from(stars).map(s=>s==='★'?`<span class="star-filled">★</span>`:`<span class="star-empty">☆</span>`).join('')
  }</div>`:'';
  const respStr=r.responseTime!==null?fmtHours(r.responseTime):null;
  const truncated=r.content.length>350?r.content.slice(0,350)+'…':r.content;
  const dateLabel=r.dateRaw?new Date(r.dateRaw).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):'';
  return `<div class="review-card">
    <div class="review-card-top">
      ${starsHtml}
      <div class="review-badges">
        ${r.countForScore?'<span class="rbadge rbadge-score">✓ Counts</span>':'<span class="rbadge rbadge-muted">Muted</span>'}
        ${r.fixed?'<span class="rbadge rbadge-replied">✓ Replied</span>':'<span class="rbadge rbadge-pending">Pending</span>'}
        <span class="rbadge rbadge-source">${SOURCE_LABELS[r.source]||r.source}</span>
        <span class="rbadge rbadge-lang">${r.language.toUpperCase()}</span>
      </div>
    </div>
    ${truncated?`<div class="review-text">"${truncated}"</div>`:''}
    <div class="review-footer">
      <div>
        <div class="review-meta">📅 ${dateLabel}${r.topic?' · '+r.topic:''}</div>
        ${respStr?`<div class="review-resp-time" style="margin-top:3px;">⏱ Replied in ${respStr}</div>`:''}
      </div>
      ${r.link?`<a href="${r.link}" target="_blank" rel="noopener" class="review-link">View on Trustpilot ↗</a>`:''}
    </div>
  </div>`;
}

function closeModal(){ document.getElementById('overlay').classList.remove('open'); }

let _currData = [];

function updateDashboard(){
  const mk=document.getElementById('month-select').value;
  currentMonth=mk;
  const curr=getMonthData(ALL_DATA,mk);
  const pmk=getPrevMonth(mk);
  const prev=pmk?getMonthData(ALL_DATA,pmk):null;
  _currData=curr;
  window.curr=curr;
  // Pull most recent non-null overallRating from the full dataset
  const globalRating = ALL_DATA.slice().reverse().find(r=>r.overallRating!==null)?.overallRating ?? null;
  renderKPIs(curr,prev,ALL_DATA,globalRating);
  renderCharts(curr,ALL_DATA,mk);
  renderTopicBars(curr);
  renderMatrix(curr);
  renderLangPills(curr);
  document.getElementById('data-badge').textContent=`${curr.length} reviews · ${mk==='all'?'All time':monthLabel(mk)}`;
}

async function refreshData(){
  const btn=document.querySelector('.refresh-btn');
  btn.textContent='↻ Loading…'; btn.disabled=true;
  try{const rows=await fetchData();ALL_DATA=rows;updateDashboard();}
  catch(e){alert('Refresh failed: '+e.message);}
  btn.textContent='↻ Refresh'; btn.disabled=false;
}

window.addEventListener('load',async()=>{
  try{
    const rows=await fetchData();
    ALL_DATA=rows;
    const monthKeys=[...new Set(rows.map(r=>r.monthKey))].sort().reverse();
    const sel=document.getElementById('month-select');
    sel.innerHTML='<option value="all">All Time</option>';
    monthKeys.forEach(mk=>{
      const o=document.createElement('option');
      o.value=mk; o.textContent=monthLabel(mk);
      sel.appendChild(o);
    });
    sel.value=monthKeys[0]||'all';
    currentMonth=sel.value;
    document.getElementById('loader').classList.add('hide');
    setTimeout(()=>document.getElementById('loader').style.display='none',500);
    document.getElementById('topbar').style.display='flex';
    document.getElementById('main-container').style.display='block';
    updateDashboard();
  }catch(err){
    document.getElementById('loader-status').textContent='';
    const e=document.getElementById('loader');
    e.innerHTML+=`<div style="margin-top:20px;color:#DC2626;font-size:12px;max-width:380px;text-align:center;line-height:1.6;">
      <strong>Failed to load data.</strong><br>${err.message}<br><br>
      <button onclick="location.reload()" style="background:var(--tp);color:#fff;border:none;border-radius:8px;padding:8px 20px;cursor:pointer;font-weight:700;font-family:var(--font);">Retry</button>
    </div>`;
  }
});
</script>
</body>
</html>
